body:
  text: 易象大意存解徽州府學教授任陳晉撰太極太極只是個理圖書內不見有所謂太極而無形之太極即寓於隂陽五行先儒謂虛其中者是也所謂無極而太極也太極伏羲只是在下一畫即濂溪亦是一圖至隂陽各半隂中有陽陽中有隂今之所謂太極圖乃根極圖也不得混看隂陽五行九圖俱是發明天地隂陽五行之理不先將隂陽五行考證明備觀圖不得把鼻圖説云太極動而生陽動極而靜靜而生隂靜極復動可見隂陽雖是二氣實則一氣之屈伸五行質具於地而氣行於天五行要先看其生成之序則洪範所云一水二火三木四金五土天地隂陽之氣絪緼蒸濡濡即是水蒸即是火只是有了氣便自然有水火如釡上蒸自然有氣汗水出只管熱便是火也水火有形而無質水至微故居一火漸著故居二水火漸成形質便生出木來木猶是隂陽疏越之氣再加堅鍊便凝而為金更加盛大便處處布滿是土先儒謂木得水清華之氣金得火剛烈之性至土則無所不有五行生成之序所謂質具於地者如此若其氣行於天則一木二火三土四金五水以是為春夏秋冬以是為相生相尅天地間惟水土最為盛大試看天壤內何處不是土而九州外皆有大海環之故一生水而五生土為五行之包絡五行木金土成了形質故其用不神水火之用則神故自無而之有亦自有而之無水看去似沉暗而中却光明火看去甚有光熖而中具黑心此謂隂陽互根夏天火氣旺而火形衰故夏日之火不甚光明冬天水氣旺而水形衰故冬時泉澤枯竭水火之形與氣互為消長者也五行惟火生土理似難明先儒曰火有推陳出新義又曰千年積土下有劫灰此亦是火生土之驗五行生成之序及運行之序火皆居第二何也陽剛不為物先又火屬心象故居中位也土雖寄旺四時而生成之序則列在夏秋之交天地間五味五聲五色人之五德五事莫不以五行配合故處處離五行不得河圖洛書河圖是馬背上幾箇毛旋文洛書是龜背上幾條折裂文所謂天地自然之易須玩其自然氣象河圖在象傳以天一地二疊數去最為自然不必定指出隂陽五行然圖書皆繪五行配合運行之理河圖以五生數統五成數而同居其位洛書以五竒數聨四偶數而各處其方圖以左旋相生書以右旋相克圖之相得有合擬于兄弟夫婦而書之竒偶偏正則分定君臣此所謂圖書之異然而圖以流行生即以對待克書以流行克即以對待生圖書皆五居中書缺十而一九二八三七顛倒數之皆成十五之數此所謂互為表裏經緯者也天地間只有個一二三四五為水火木金土如何又有個六七八九十善乎先儒之言曰一得五而為六二得五而為七三得五而為八四得五而為九五合五而成十總之水火木金離土不得六七八九十皆從五過也又萬物皆從一生一與一為二一與二為三一與三為四一與四為五故一者數之始而無所不貫也圖與書一皆居下一者天命之根一陽之氣畜固於重隂沍泉之下所以為萬物發生之根本也大抵天地間的生理不要只在發舒上推尋正須於摧殘剝落之地至深極靜之中看其一團生意凝固堅實愈凝蓄得久愈藏祕得深則發出愈為有力書易九於上者九老陽之數乾象也戴天而尊乾明乾體之大而天象之無不包也又乾金尊於上愈蓄得下面那一點水充足有力而生生不息矣書與圖東北方之位不易而西南則易西南方不易則無以成相克之用河圖畫卦洛書敘疇似洛書無與易事然其理無不通故大象傳總曰聖人則之先天八卦次序總之有太極便自然生出隂陽朱子云天地間理一而已氣則無不兩者二語簡盡明白既然生出隂陽便只管生了去由兩儀而四象而八卦總只是程子加一倍法邵子詩云須知一本能雙幹始信千兒與萬孫到得千兒萬孫便六十四卦三百八十四爻俱瞭然在目矣先天八卦次序最為自然總只是一生兩法兩再生兩而隂陽老少之形立更加上去則八卦以成至成卦後逐象玩之便自成乾一兊二離三震四巽五坎六艮七坤八之象起初原沒有個山澤風雷等物事先在意中先天是畫成了看故各成一天地風雷等象若濂溪則以太極生隂陽即以五行生萬物最為直截故先儒謂先天氣象大周子義理精先天八卦方位此圖是一個渾淪天地乾南坤北天尊地卑也離東坎西日月之升降也雷起東北隂陽交際之會自隂而升陽風盛西南由陽交隂風威忒盛山鎮西北西北方全隂之聚凝而為山藉陽以鎮之也澤注東南東南方陽氣所鍾而為水所壑則火氣不烈天地隂陽相濟之理亦所謂隂陽互根者也嗚呼觀先天方位真如天造地設包括一切更無可移動處易雖是八卦其實只以天地水火四卦為主故乾坤坎離四卦居正位風即天氣之吹噓山即地形之隆起雷即火之藴於地中澤即水之行于地上此四卦居偏位六十四卦橫圖六十四卦橫圖不過八卦之上各加八卦所謂因而重之是也並無著意安排處到得畫成後細加推勘自然乾坤在兩頭剝夬二卦緊傍乾坤而復姤二卦恰居正中易所謂天地之心先儒所謂天根月窟是也邵子詩云須探月窟方知物未躡天根豈識人天根月窟間來往三十六宮都是春又曰亥子之間得最真可見姤復相交是一部易書緊要處乾坤道理俱從此透入到得三十六宮都是春便處處是天理流行故曰天根月窟是一部易書之關紐也亥子之間最修鍊家切要功夫又曰先天學心法也圖皆從中起萬化萬事生於心六十四卦方圓圖圓者象天方者象地天道南行故陽氣自下而升隂氣自上而降又左陽而右隂也先儒謂左邊一畫陽即對著右邊一畫隂又謂左三十二卦是陽然透體以坤道摩蕩一過右三十二卦是隂然透體以乾道摩蕩一過橫圓乾坤居兩頭復姤居中間圓圖即以復次坤姤次乾才喜全陽而即為隂之所伏已是純隂而即為陽之所生一隂才遇然必剝為純隂而後已一陽才復然必夬決而還歸於乾可見復姤二卦氣機之所從生即物理之所必極最為吃緊關鍵陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中則皆順行方圖分作四層看天地定位否泰反類否泰乃天地合之卦交則為泰塞則為否山澤通氣咸損見義咸損山澤合體山上澤為咸山下澤為損雷風相薄恆益起意恆益風雷合體水火不相射既濟未濟可見水火為天地之大用上篇終坎離下篇終既濟未濟聖人之深意存矣後天八卦次序後天八卦次序不必有甚深意只是提起乾坤作父母顯出六子功能究竟六子功能皆父母為之主宰則皆乾坤之運用耳後天八卦方位後天卦位改換先天主卦氣之運行即太極圖説所謂五氣順布四時行焉者也先天坎離當朝夕之位後天當子午之位天地之大用在水火至此則乾坤家當全付之坎離矣又日自東而南當午之位月自西而北當子之位為得隂陽之正位也震為長子故東方始出用事而巽長女艮少男夾輔之以助其功用若兊為少女則置之西方不用事之地乾坤父母俱居西方非因父母已老真個不要他用事須知天地間東半邊主發生西半邊主收斂而東半邊發生處全看西半邊收得力足非以乾坤父母力量保合固藏使其內間生意飽滿充足則來嵗發生必見單薄氣象故乾坤之不用事正具有大用存焉滿盤筋節俱在乾坤所謂乾以君之坤以藏之是也乾南坤北交而為泰則乾北而坤南矣離東坎西交而為既濟則日西而月東矣此先天之所以變而為後天也五氣惟水火各據一卦木金土則兼據二卦其故何也水火之性隂陽即時備具木金土則不然木之生也由下而上震一陽在下為木之根幹運居東方木氣上升枝葉暢茂而為巽之隂木木氣生火運行南方而離火陽中含隂隂陽之性備焉五氣惟火與金不相生故西南位以坤上間之火生土也坤為隂土火金之性最烈非得純隂之坤以間其中則不能成濡潤之功且坤土盛大長養之功始全土之生金始猶稚嫩故西方兊為隂金氣未凝結愈加堅鍊則為西北方乾之老金木由下而上故先陽而後隂金由稚而堅故先隂後陽也惟金生水有乾金之堅鍊乃生北方之坎水水亦同於火隂陽即時而具者也然北方水氣凝寒非得土氣而木不能上達坤為純隂之土艮一陽止於上為陽剛之土隂氣非得陽氣以實之而土亦稚不能上升故艮居東北方為新陳嵗運交接處尤屬至要者也京房以土旺四時呂令土居中央後天土居丑與未較呂令增其一較京房減其二其故何也四時木生火與金生水皆不用土惟火生金水生木則土著其功用又四時皆隂陽勝之卦惟寅丑申未之交皆三陽三隂之卦得天地之中氣彖彖者總一卦而斷其義有象有占彖極簡極平易總之一卦數字可了顯然明白蓋不欲多生枝節障人心目也然文彖亦有以繁見妙而繁而括非聖人不能盡其義即如訟彖十六字具七義訟之理無不全訟有孚謂其事得理信心而又窒不得伸斷乎當訟然又加以懼惕又須適中而止雖十分有理得勝而亦不可終訟且必得一居中得正之大人來斷此事方好且亦不可冒險而行故曰不利涉大川此豈不是繁而括又如夬彖揚于王庭是聲彼之罪孚號是盡誠以呼號我之援助而又加以危厲告自邑是先自治不利即戎是不可妄動干戈十九字具五義攻邪之道盡矣亦有意不甚多而偶用疏詞錯落如匪我求童彖及改邑不改井彖皆以錯變入妙也爻爻取相交逐爻起義較彖為推研入細取象極竒極精凡天地間至微細物極鄙猥事聖人無不取入象內有六爻聨絡次第起義者亦有各爻另出一義者程朱只取承乘比應不取互卦然觀邵子易吟曰觀象徒勞推互體則互體原向來所有雜卦傳即是發明互卦先儒以為從後天來象有彖象有爻象又有夫子自己發明之大象爻取象竒矣象傳一以平淡承之須玩其咏嘆自然之妙或用一二字轉換最為有味即如坤初履霜堅氷至象為倒一字曰至堅氷也元公慮其終孔子要其始旨趣瞭然無妄爻曰或繫之牛行人之侍邑人之災象曰行人得牛邑人災也意味總在一也字慨嘆又如蒙彖傳曰瀆則不告瀆蒙也亦是用轉換法便另有意訟彖詞已是全括而夫子大象傳為增一意曰君子以作事謀始此又是添補法太史公每作本紀列傳敘述極為張皇贊語另出一意愈淡愈妙六十四卦大象傳聖人示人以用易之方將物象與人事相配合樞紐俱在一以字六十四象便有六十四以便是六十四個用易的方法天道人事無不盡其中向來讀易俱口頭滑過今一提出看便如我孔子傳我六十四個好方劑也余搆一小齋書六十四象傳於壁顔曰以齋晨夕坐玩用以警頑而娛老二卦合體而成象然却不是板煞的即如乾坤二卦乾象天而主健坤象地而主順加一行字勢字便卦氣都見屯不曰水雷而曰雲雷雜亂晦冥象也蒙不曰山下有水而曰山下出泉幼稚蒙昧象也且是實象不是虛擬即如地中有水地中有山天在山中皆實有此象家人象曰風自火出恰然火中有風非第曰風生火也井象曰木上有水先儒謂夜間地氣上行清晨木上必吐出水珠聖賢格物之妙真是處處不遺上經乾卦上經首乾卦明天道當下文周亦是同他卦一例繫彖繫爻元亨利貞亦祗是象占元亨屬象利貞屬占並未有將四德配合的意思夫子觸著胸中道理看得乾坤體大便以此四字擬合四德一口氣莽莽蒼蒼且推排出這個氣象來將四字平列四項又縮歸兩項又總結歸元上元亨利貞又總結歸乾上道理直是一片渾淪無間彖取象於天爻取象於龍天主包括龍擬變化彖重發明天道略以人事相錯爻則著意人事處為多看易要淺要活如潛龍勿用凡人家一切求名問利之事皆有此象此占不要説深夫子説向隱德去又另是一般説話不要因夫子説看呆時乘六龍以御天也雲行雨施天下平也是天地間化工文字乾卦説這般大道理而以知進退存亡結嗚呼論語以色斯舉矣結下論以知命結聖人之寓意微矣坤坤大率主順承意亦處處具扶陽意屯乾坤之後繼以屯蒙天地草昧氣象也此卦以初四爻為主分明具作君義不當君位故以建侯屬之屯初是第一陽又震為長子特出承天地父母之任乘承比應程朱看爻取象法不言互卦折衷亦不言互卦然亦有互卦自然入象者即如屯中爻有艮象三入於艮艮為山林故有即鹿入林象或曰鹿古本作麓山足也他卦可類推但要取其自然者耳蒙蒙承屯亦草昧象蒙以二陽爻為主具作師義蒙中體有坤象有震象故有納婦子克家之象若竟不取互此二象于何屬乎需需不是不進取其能待進得恰好需于酒食需中有此一象序卦傳即以需為飲食之道後來如麻衣易六爻皆以飲食取象未免穿鑿本卦坎為血卦故四有需于血象郊沙泥皆從水取象訟訟彖説出訟許多道理象傳作事謀始仍取不訟六爻亦俱以不克訟稱善上爻則所謂終訟凶者師師第一要貞又須是丈人行師有吉而未能無咎有無咎而不必吉四層合來其義始備雖湯武仁義之師亦不能無毒于天下容民畜衆具井田義爻不待有取於二之以律行師而併嘉四之能全師惟在人君命將之專行賞之當而于輿尸小人尤致警焉長子即丈人于二為丈人于五為長子比彖取人比于我爻取我比于人以孚誠為第一義建國親侯具封建義小畜巽豈能畜乾故象傳止取懿文德初二兩陽不為所畜者也三與四比故溺于四而又致相爭四以弱隂畜全陽宜其見傷能盡孚誠于陽則得無咎五孚于四者也上則畜極而通矣主全卦言之履履取和悅以躡剛強天澤定分及履者禮也卦有此象非其本義所重初二兩爻正和以躡剛者故吉三任剛性故凶四取其剛而能柔亦吉五履帝位又下應兊悅何所不可然以夬致厲朱曰傷于所恃為戒深矣此上之所以考祥徵吉也泰泰否二卦乾坤合體為上經最緊要之卦彖只小往大來一句夫子恰有許多慶幸話頭泰卦前三爻好後三爻便有不好的意思否前三爻不好後三爻則漸漸好來正合彖小往大來大往小來之義看易卦如從四面看月面面都是清光圓滿即如四爻先儒有解作休休有容之義者味孚字及中行願句却合得此義况四位近君道理豈不通得但本義是合一卦全體又合二卦全體看來以下三爻為君子便以上三爻為小人似近自然也面面看來清光具足何必定易朱説然即存此一説亦可帝乙歸妹本義謂帝乙歸妹時得此占先儒謂王姬下嫁之禮至湯而備五以隂從二陽虛已下賢象也又互得兊象故有歸妹之象大率初之連茹四之翩翩主言氣類三之平陂上之城復主言時運而二與五則君臣之居中待泰者也否否只是反泰看前三爻自是不好後三爻便急望他好便前三爻不好還許他貞吉望他包承強勉教他包羞總不要他將不好處全放出同人火上同天火天下照同人大有是極文明之卦有以同而異者暌是也以異而同者同人是也通天下之志乃為大同于門于宗只是公私之辨然二忌於宗五正欲其大師相遇同人到底取其能合又取其能公故上于郊亦可免悔大有大有之世正不是一味包荒遏惡揚善乃所以主持大有之運也五爻正所謂應天時行者才説個交如即繼以威如方見聖人保盛憂明的心思作用上一爻當大有之世備福德之全者也爻義見繫辭謙謙卦好處聖人口説不盡天道屬氣地道屬形人道以情言鬼神以理言謙不是一味自卑正欲裒益而得其平也如此説道理便圓而大初説一個謙字不足更疊用謙謙字四又加一撝字聖人之傾意于謙至矣鳴謙不必有甚事業只學問謙沖自致聲譽無形好處最為難得勞謙真是有功不伐三代後惟郭令公足以當之五處君位而能謙漢文帝近之上六鳴謙與二地位不同如老臣宿將出居在外凡事謙和亦能致譽然足以感孚其私邑而已豫人心和樂以應我無有不善若已自為豫則有善有不善作樂崇德易中之樂也惟四一爻與彖合朋來盍簪是人心之和以應我餘俱屬自豫初之鳴豫小人得意情狀如睹二不言豫能守正也五幾沉于豫賴四剛以正之三與上皆幸其能悔能渝故無傷隨隨是吉卦元亨利貞下加無咎字氣象便逺遜于乾矣爻稱二為係小子五與二應則又曰孚嘉故知易象最活隨至第六爻乃誠意交孚之極故不啻孚賢併可亨神蠱蠱壞極即便加以元亨非元亨不足以治蠱振民育德振字最切治蠱大學新民猶具從容氣象振民則加以奮厲也育德者振民之本先言振民主治蠱而言也幹父之蠱是大概説實有一般人家宜幹母蠱者尤是難事裕父之蠱中人之子率坐此病五主繼世賢君言當治蠱之時却偏有一種髙人置身事外聖朝亦儘容他爻髙其事象嘉其志臨臨大善之卦彖便預為慮曰八月有凶觀本不好聖人却别取一義教思容保即敦臨一敦字也卦以陽臨隂自然以二陽爻為主故俱曰咸臨餘爻只就卦上取臨字大義而已四與初應至臨悅賢之至知臨以位言即所謂聰明睿知足以有臨也敦臨統一卦之終而言終以陽臨為主故曰志在內也觀觀彖是人觀我爻是我觀人大率聖人立意尊陽臨陽長之卦既以二陽爻為主觀明係隂長之卦却仍二陽爻為主故取名為觀噬嗑噬嗑主用刑之卦以中一爻為梗化之小人故須用治然爻象又以四為用刑之人受刑有大小用刑有難易賁賁小吉之卦天文人文聖人却説出許多好處賁趾只是自賁賁須則能賁物然非附二之陽剛不能成文明之象三又非藉前後諸隂不能成潤澤之功也三至上有順象故二曰賁須下三爻離主文明上三爻艮具止義皆主反質白馬丘園束帛皆白賁之義一部周禮鋪陳文物結歸白賁崇素反質聖人具有深心易以履為禮其實賁禮意也剝剝已是陽氣欲盡然上取孤陽獨存三取惟陽是應五亦取其能受制于陽總要不為陽害順而止之觀象也彖一語淡釋得妙艮為果蓏故有碩果象坤為大輿故有君子得輿象復復初爻即是剝上爻豈有陽氣俱盡忽于至日便來一陽須知上面剝下面便生生氣只管積趲了去到得一月便成了那一畫故以為一陽來復剝只不利有攸往句復則有許多慶幸話頭復見天地之心忒是精言是聖人特地示人處不逺復先儒謂是覺體最是蓋稍待用力去復相間便逺才有不善便覺覺便復還原體故曰不逺復惟顔子足以當之休復是能從善頻復具自克意中行獨復誼力極純敦復無悔殷太甲周成王近之卦彖在氣運上説爻在人心上説無妄有實理自然之無妄有人事適然之無妄莫管他人事適至我只具實理以應之以初陽爻為主所謂主誠于內者二無營私之心故皆往而得吉得利三不免于災五不免于疾上不免于眚其何往乎故四取其可貞五幸其勿藥則皆不致以妄動取咎矣大畜主學問言是能自畜其德主世道言是能畜止邪惡彖主畜德意多爻主畜邪意多蓋是以畜為止下三爻取自止之義上三爻取能止人初戒其進二能不自進三則與上合而進矣四能止惡於未形五則幾幸其可制上則畜極而通矣頤頤具養德養身二義慎言語節飲食正養德養身之事先儒引釋此二語曰禍從口出病從口入淺語實至言六爻不外顛拂二字求養于下為顛求養于上為拂非陽剛不足以養物初具剛陽之才不能自養而反資四之隂柔四則能資初之陽以養物上九以剛陽當師傅之任五賴之故能養天下大率下三爻皆取自養口體上三爻皆思養物大過大過只是陽過故諸爻皆以不過剛者為善初之能慎柔也二與初比資其柔故有生稊之美三爻剛位剛太剛則折故棟橈四以位居柔故棟隆五與上比五陽過而上又隂過生華不足為美上才弱而處過極故過涉滅頂巽為木兊為澤楊近澤之木故以為象過涉亦從澤取象爻以滅頂為無咎而象曰不可咎也更精坎首乾坤終坎離所謂天地之大用在水火諸卦皆一字名獨坎上加習字者何也坎主險陷非吉德必歷試艱難而後可出重險也坎中實故為有孚心亨之象此亨字屬象不屬占常德行習教事指出習字之義六爻只以九五為能出險以陽剛居尊位故也離坎重險非剛不足以濟故五爻吉火性􅏥烈非柔不能順之故二爻吉坎中實主誠離中虛主明下經咸卦上經首天地下經首男女有心為感無心為咸咸感道也男女尤相感之至者也彖言感象傳曰虛受最是圓相復見天地之心咸見天地萬物之情復始幾所生咸則感通之至六爻從人身取義咸拇視其所之腓猶可以自主股則不能自主四屬心所以為感者也脢不能咸物而口則專主于悅恆恆是久義然必久于其道乃為可常久彖吉而爻則皆不甚吉所乘之位不同也惟二能久中故悔亡遁隂長故君子當遁然須遁得恰好要得時字義下三爻止之象故初取不往二取固志三之係遁猶是戀戀二隂若上三爻天空地濶能超然逺遁矣四之好不如五之嘉五之嘉又不如上之肥肥字最妙考槃三章得肥字味明夷以初為幾先主夷者上也若遁則以上為逺去初不為尾乎大壯大壯是陽壯之極但壯字不能無病故戒以利貞諸爻皆欲其壯而勿用壯二之貞吉五之喪羊得中道也卦體似兊兊為羊故諸爻皆以羊取象晉火在天上大有君道之極盛也明出地上晉臣道之極盛也主言臣道故曰康侯而五當其任以柔進為主故下三爻皆吉五以柔居尊正所謂康侯也為明出之主吉四與上皆以剛進不吉明夷正與晉反對卦彖以箕子取象六爻俱切紂時勢看初之于飛伯夷太公也二之夷股文王羑里之囚也三南狩武王伐暴救民也四獲心出門微子抱器來歸也五仍從箕子取象上之登天入地象紂之自焚死也有以明而晦者下五爻是也不明晦惟上獨矣家人作易者其有憂患乎家人以全象言之則當如夫子所謂父父子子兄兄弟弟夫夫婦婦始為正家之極則乃文王繫彖專曰女貞何也蓋人家乖離之事未有不生於女釁者三代末季其明徵也文王切言之夫子正言之言物行恆齊家本于修身治家以剛嚴有法度者為吉初之間家三之嗃嗃上之威如皆是道也惟五不言剛嚴君道之盛也婦人以順承為吉二之無攸遂四之富家正取其能柔也睽男女初交情志投合若女與女便多乖忌況中女少女乎讀睽卦而凡人家姑嫂妯娌妻妾不相和睦情狀具見其槩六爻皆始睽終合初喪馬自復四遇元夫合矣二遇主于巷五厥宗噬膚合矣三無初有終上遇雨吉合矣蹇蹇總取能止意惟二説不得個止字臣子應君當險難之秋義無可逃故曰王臣蹇蹇四與上俱近五故皆欲五相連碩而共濟耳解患難既去宜以安靜自處初交最好得靜守意看去又有解退小人義二獲狐除內姦也上射隼勦外冦也五君位四近君皆以去邪為事三則小人之妄竊髙位者耳損損下益上為損損上益下為益可見上不嫌損吃虧總要在上耳卦名是損下益上卦詞却説損的好處蓋泛言損義本義釋象傳曰少男多忿少女多欲二語精友人郝君為增二語云懲忿如山窒欲如壑亦精爻就損下處斟酌其至當者初之酌損是不過于損也二之弗損乃正所以益之也三因損而得相合之專四又另尋一損法曰損疾五受天下之益而不能辭上則思所以益人而惠不費則更無所損也益益彖詞亦不專言損上益下凡天地間有利益事皆言之遷善改過學問之益也初與二皆受上益者三與損四同另加以一益法曰用凶事四與五皆思益下五乃主益之人上惟求自益何由得吉夬小人將盡之時自然大吉然決之却不欲過暴六爻皆以決之勝負為言初恐決之不勝二以惕號無咎三亦恐以壯頄致愠四則聞言不信五又未免係戀小人若上則小人之受決者姤姤亦是不能不相遇的但要君子不受制于小人小人不犯君子初爻設兩象以為小人戒二能制初三不遇於初故皆無咎四不能制初故凶五以尊位防始生之隂挽回天運上不能制隂然亦不與隂遇潔身逺禍之人也萃萃聚之道匪一假廟以萃祖宗之精神見大人以萃君臣之遇合用大牲承假廟言利攸往承見大人言象傳除戎器又另出一小萃事却正是人所易認六爻皆欲其以類相萃初以四為正應二以五為正應三以上為正應然窮交也四五皆得其萃者上乃放逺之臣求萃不得故有涕洟之象升賢聚而升是大吉卦故彖無戒詞初不能自升巽于二以同升五柔而二剛恐有震主之嫌故須尚誠敬三則一于升四近于五再升則不可故須以文王之道自處五正與賢升者惟上不得升之正故戒其冥升困處困欲其能亨亨乃所以貞也致命遂志致命困也遂其志則亨矣初與三真是困而不亨者初坐困三進退俱困上雖困而猶望其能悔此三隂爻象二困酒食四困金車五困赤紱是好處亦困然皆有亨祀之吉四亦有有終之慶如此則亨矣此三陽爻象井井主養道初之泥二之谷傳所謂眢井也三泄則不泥四甃則非谷已成井矣五則功能及物而寒泉食上則井收勿幕任人之汲井道大成五取剛陽能澤物上則取其坎口不掩革古人重改革之事故須孚須貞下三爻是鄭重而不敢革不輕革四則革當其任有其德有其位有其才有其時居水火之際為革之主至五與上而革者新成文明之象矣鼎雖曰革故鼎新然鼎實主養義井民間私汲之物鼎則宗廟之器故主養賢上經大有彖直曰元亨此亦直曰元亨皆大善之卦也初足二三四皆腹故皆有實五為耳上為鉉直取鼎象上爻之吉無不利亦與大有同大率皆尚賢義震震承鼎來故為主器大率主恐懼意震陽在下故以初為主爻與彖合二與初近故能因震而動而亦無所喪也三四及上皆不能自振厲者五則猶幸其無喪有事艮震主動艮主靜以止為義取象與咸略同初趾二腓三屬心咸以心屬四此以心屬三各以其中陽爻為主也四為心故五為背上為口今以心屬三則四為背而五為口上則統一卦之終言之漸漸進有序惟婚姻為宜彖取女歸六爻皆象婚姻婚禮奠鴈故六爻皆取鴻象鴻水鳥故取于干于磐于陸之象大率以隂陽之相應者為吉隂陽不相應則皆進之未得所安者耳惟上居卦外則不以女歸為言歸妹漸女歸之正故吉歸妹不正故凶永終知敝即從始歸時料定後來不好永終知敝當與作事謀始句成對初無應不得正偶二有應然所應者隂爻故不得賢夫三較初為更賤凡下爻之無應者皆取為娣四在上無為娣之理直愆期不嫁而已歸妹皆無吉爻獨五稱吉者蓋歸妹是女求男之事王女下嫁義不嫌于以上求下也上爻直是婚姻不終豐明動相資盛大之象宜日中不欲過盛也通體皆從日取象從明取象下三爻主明上三爻主暗此卦以同德為善不取隂陽應初四皆陽爻為明動相資若二五皆隂雖二不免于疑疾五則以來章致慶若三陽應上隂上固不免豐屋蔀家而三亦折其右肱矣折衷云易雖是虛設此象然必天地間實有此事如日食過多則有見星之事所謂日中見斗見沫亦時有之也豐屋蔀家之象當如今所謂髙墻者是旅卦於處旅之道備矣旅道貴柔順剛亢則致禍三與上皆失之剛亢者上為尤甚二五皆以柔順得處旅之正五有文明之象如士大夫出疆載贄而得譽命寵榮旅之最吉者也二則通言處旅之道即次懷資童僕貞旅道大善夫子又于三者中獨提唱得童僕貞可見好僮僕從古為難四亦有于處懷資之美然加一斧字便有一種防衛的心情故曰不快四亦陽爻幸其能居柔初太柔下故未免以瑣瑣取災初例主微賤先儒謂即僮僕斯當如厮養之厮鄙意以僮僕瑣瑣非有大失當是泛言處旅之戒從初起例易中每有以一卦大義先從初發者如蒙之發蒙利用刑人師之師出以律是也不必以初定卑賤作小子童僕看也巽巽入也然却不以隂為主全賴陽以制之所謂沉潛剛克是也故初之進退則利武人之貞二史巫紛若四田獲三品五先庚後庚皆能振興揆度而行事者故皆吉若三與上一味卑巽靡而不振或不免于吝且凶矣巽無資斧義齊乎巽作齊斧解最是兊兊取悅萬物在造化上説最好在人心上説則有善有不善初二兩爻以剛體為恱故有和兊孚兊之美四之商兊上之引兊善不善猶屬未定三則體隂致凶五以比隂取厲皆非恱之正者習坎重離洊雷兼山隨風麗澤疊字卦標題最是雅切涣渙取假廟行舟二事萃渙之大端也萃聚祖考之精神以廟涣因祖考之精神既涣而聚之亦用立廟六爻皆取救涣而用各不同初因其始涣而速救之為力甚易二用幾以自安是救涣先求固本三之渙躬散其私也四涣其羣散其黨也五涣其號令而併散其居積天下歸心矣上則能出乎渙害斯逺矣節卦以水澤為體澤取止水取流故節雖取限制而以亨通為用初二兩爻澤之止也皆以不出取象初無咎而二凶者初居澤下宜于止二漸上則可以流故有失時之凶三則流而溢出者四居坎位五當位居中順賢澤民正如水之安流人飲之而得甘者豈不為美至上則水流而將涸矣正蹈彖苦節不可貞之戒中孚中孚取中實中虛二義爻義以不係于私者為吉故初戒有他四取匹亡若三信上而已不自主上信三而守窮不變則是尾生女子之所為非貞道矣惟二剛中自守鶴自為鳴子之來和鶴無心也五則孚誠之至君之所以孚賢者如此或曰五君位不當稱子鶴鳴子和謂二與初然攣如字則似出于五之孚二耳巽為雞又在上爻故有翰音登天之象小過天下事亦有不可以常理論當用過者然宜下不宜上宜順不宜逆故象傳特為尋出三項過而不礙的過法彖取飛鳥爻亦皆以飛鳥取象初上兩爻飛鳥之翼上已上而初志亦在上皆上而不下者二四五皆合宜下不宜上之則三過剛違斯義矣既濟上經首天地終水火下經首男女終既濟未濟水火天地之用既濟未濟水火之交也天地交為泰不交為否水火交為既濟不交為未濟既濟當在泰之後為不如泰未濟當在否之後為優於否既濟豈有不亨之理然不無小未亨之處豈有不吉之理然須防終亂也六爻初直是不肯濟二亦不輕于濟三象以伐鬼方其濟之難如此四之慎如此五居濟時積誠意以交鬼神上則有急濟之厲初時時後顧故濡尾上則一于前進故濡首東鄰西鄰似亦未定是指文王與紂未濟物不可窮故以未濟終古人製衣造屋必缺一角示未成也既濟要全不忘未濟未濟却不可急求濟既濟初爻濡尾無咎以其慎於往濟也未濟初爻濡尾示吝以才不能濟也初爻濡尾吝而二之曳輪又稱吉者何也以才能濟而加慎也三徒然未濟故凶既濟以髙宗稱三未濟以髙宗屬四何也既濟三為陽爻又既濟重內卦猶泰之以內卦為主也未濟四為陽爻又未濟重外卦猶否之以外卦為能出否也右六十四卦皆顛倒乾坤八卦而成者也卦象即乾坤八卦之象合兩象而成一象卦德亦然卦變則或取不取無有定也卦體則內外二體成剛成柔者是也爻位由初至上有貴賤逺近承乘比應之不同大率以居中得正者為吉二五兩爻是也間有不正能因中以求正亦可免于吝也餘爻皆不中然得正亦吉初爻例從賤稱然為卦本亦有以全卦之義從初發例者又或初為卦主則屯初曰建侯三四凶懼謙三為卦主則曰勞謙吉豫四為卦主則曰由豫大有得頤上為卦主則曰由頤厲吉又上雖超出事外然或有統一卦之終以全義屬之者總之易無定象也又有同是一義在此卦吉現于他卦則不必吉在此爻為吝從對爻看則曰嘉移位換形不可滯執循環疊玩而所謂六十四卦當不止六十四卦之用三百八十四爻又當不止三百八十四爻之用矣繫辭豫於六十四卦既各撮其大義今反略於繫辭者何也蓋繫辭中所發明之理即具於前圖象及卦象中不容更作第二番説也所以預將繫詞之藴於前圖説內著出者蓋不審定天地隂陽五行之理六十四卦無由起例也今為舉其義藴之未甚昭然于卦象中者為舉其大凡乾坤易簡天地如此之大萬物如此之紛賾夫子獨摘出易簡二字以示人蓋是從一貫源頭説下將許多道理併攏來看而得此二字簡當不易之妙也三極之道此所謂各一太極也易有太極指生初太極從那一個太極生出這三樣物事來便一物一太極矣精氣遊魂此二句人太看深不知祗狀得個鬼神鬼神只是個隂陽論理精屬隂氣即屬陽然氣總併在精上故為物為鬼若遊魂則自是神也説個遊字變字便隱隱鬼神之情狀如見矣神無方易無體天地間只有個隂陽何以又有所謂神與易蓋隂陽運行有所以主持乎隂陽者其理所謂太極而其本理以行於氣所以握其機者則所謂神也神是隂陽具的故或在隂或在陽豈不是無方易只是這個隂或更換為陽陽或更換為隂其更換處出於氣機之自然自成了那個物事非有甚本質也繼善成性此二語千古性學之祖理之在天者為天命在人者為性繼之者善乃天人之界天將以此付人人將從此受天之付此際無有不善的善不止是善惡之善此時一種絪緼的妙處非善不足以形容之也大生廣生乾一而實以質言曰大生坤二而虛以量言曰廣生擬議變化觀賾畫卦觀動繫辭原是因擬議而畫爻象待至既成爻象後却又將那爻象上的道理擬議到我之言動上中孚爻只是取同德相應今却擬議到言行感通同人爻是始睽終合今却擬議做迹睽心合餘爻類推如此方謂之擬議若本爻如此説我之行事自與他合則無所用其擬議矣天一地二此即河圖之數已詳前圖説內不贅大衍之數河圖之數嬴五洛書之數虛五合之却成五十嬴五體也虛五用也五十者參河洛之數酌體用之中而為之者也此數學𩔶學併迎日推䇿法之祖唐一行作大衍厯命名以此筮法詳筮法不容不究數法易以六七八九定數何也今第以河圖論之陽之生數曰一三五合之豈不成九隂之生數曰二曰四合之豈不成六七者陽數之退八者隂數之進又數起於一而成於十九者十分一之餘也八者十分二之餘也七者十分三之餘也六者十分四之餘也筮法過揲以四數之三變所餘之數不五則九五以一其四而為竒九以兩其四而為偶其又以四定數何也蓋竒偶老少成於四象也成於四象故一四為竒二四為偶也又竒象天天體圓圓者徑一圍三陽用其全積三變之三則成九矣偶象地地體方方者徑一圍四隂用其半積三變而為三二則成六矣歸竒從本義作餘數扐謂手指間但挂一必須合却餘數而後五嵗再閏法始定過揲之四數成乾䇿是四九三十六合六爻之乾䇿豈非二百一十有六過揲之四數成坤䇿是四六二十四合六爻之坤策豈非百四十有四乎將與周天之數相合餘可類推占卜占卜只要理通憶在廣陵與友談易友曰有某者遣子楚遊卦得天水訟變為風水渙座上羣曰乘木有功友曰不然巽為木為風在地為木在天為風今天水訟變為風水渙是天變而風也涉江之險其可不防果驗爾曰天與水違行本卦彖明曰不利涉大川豈待求幽索隱京房于審象外加看干支飛伏其術至精但全任術不任理京管之學所以異於聖人之學也制器尚象聖人非真個用易象去制器但器象有與易象合者故後每節用一蓋字所謂擬議也易有太極見前圖説天生神物謂蓍龜也王道得蓍長一丈叢滿百莖易用蓍兼言龜者蓍龜一理言河圖必兼言洛書也龜古重於蓍物老則智能前知也吉凶悔吝生乎動吉凶悔吝易之占也然必因所值之動爻而見即泛言人之行事吉凶悔吝亦緣動生天下之動貞夫一天下自有個一定的常理當吉自吉當凶自凶故曰吉凶貞勝如此豈必存一私意致憧憧往來乎陽卦多隂隂卦多陽此言六子之卦震坎艮為陽卦巽離兊為隂卦陽卦以陽為主隂卦以隂為主隂陽原是不能相無但以陽為主是順事故曰一君二民以隂為主是逆事故曰二君一民憧憧章此所謂易之文言也乾坤取入二卦內中孚九條承擬議説下此數條皆以發明貞夫一之理憧憧以下各條雖亦承憧憧説發揮貞一然各條各有格言警論當各玩去不得泥看即如節初爻君不密數句令人讀之悚然漢末事形如睹鼎四爻德薄位尊三句宛乎一袁本初在前損三爻發出天地絪緼男女搆精這一種大道理至如小懲大誡及善不積惡不積等語誨盜誨淫等語皆是千古龜鑑其一種跌宕風神如履霜節藉用白茅節生人無窮往復乾五同聲相應節或謂是比興體然看來句句皆實象同聲是雷風相薄同氣是山澤通氣水流二句是水火不相射雲龍風虎隨著雷風山澤説本天二句則是天地定位也節初爻兊為口舌有言語不密象山澤損少男少女故亦有男女搆精象也易興於中古羲皇只有畫而無詞三畫之卦有名而六畫之卦未有名名與辭皆興於文王憂患九卦三陳九卦以明處憂患之道專言卦義首列其名中詳其體終言其用上經三卦下經六卦聖人偶然觸著九卦道理可處憂患非必於上經取其三下經取其六也若如胡氏説上經某卦與下經某卦對又有截去首尾之説似聖人不用此巧法不用此安排彖義爻義見前卦説內參天兩地圓三方二故曰參曰兩合之共成五數河洛皆數起於五也天地定位數章詳前圖説此數章最是易之精藴一索再索此亦是畫成後看得乾坤初畫為氣風雷氣也中畫為精水火精也上畫為形山澤形也乾馬坤牛等象乾擬物象為龍坤為馬此處則又乾為馬而坤為牛震又為龍總之易象是活的只管推移得動若隂陽道理一定便推移不去耳雜象雜象荀九家各有增入處然天下之物無不可增入者序卦傳先儒以上篇屬陽屬天道故凡天道之正及一切陽卦陽爻之盛俱列上篇下篇主隂主人道凡人道之交及一切隂卦隂爻之盛俱列下篇舉例詳推甚為精密但其間文義錯雜似有未可曉處先儒又謂此不可為聖人之精而為聖人之藴蓋是雜七夾八説在那裡歐陽氏則竟以為非聖人之言竊思易未遭秦火何故序卦以下數篇為得之河內女子則或出於門人所記從前不附於經未可知也善乎折衷之言曰孔子之序卦如此若别為之序義理未嘗不可相貫今故略為推論其自然者以附于後有天地然後萬物生焉此言生天地生人之始洪荒初闢故為屯為蒙屯取初畫陽剛為建侯屯初畫陽有作君之義蒙二畫陽是作師天地定位君師之道立焉始經開創一切政教俱要能待故取於需其間必多梗化故必訟而且至用師此俱是一派洪荒開創景象待得干戈既定比象成矣加以畜養承以禮教漸成盛治於是以泰否二卦持一篇之中樞君臣交泰唐虞之治化也同人大有乾坤極治之休也此明明是寫中天景運治化既成故宜承以謙守以豫處以隨此俱是保治良方然盛治中瑕釁已萌必至釀而為蠱臨觀所以防蠱失而主持風教也噬嗑用刑以輔風化賁用文采以飾太平此又煥然成一盛治規模矣然世運不能終治天道必有循環故又以剝復二卦還其始運以持乾坤二卦之樞乾坤既還其始運於是漸就誠實由體達用為無妄為大畜為頤為大過德盛而才昭大過又示以濟變之材也篇末以坎離終天地之大用在水火此上篇之大結搆也上篇首天地下篇首男女咸恆二卦下篇之領綱大率上篇主天運而兼治化下篇多言人事而間及天運人道之大莫如進退遁以退為義大壯晉皆以進為義壯往也聖人每於好處即參一不好象以示警進必有傷故以明夷繼晉以睽繼家人再即人道之大推拓言之為蹇解為損益王政之最大下篇極緊要卦由此復説到氣運則夬姤二卦持下篇之樞上篇復還乾位下篇姤返坤運一志幸一昭惕上下之義也既以小人之見遇為憂則以君子之得朋為慶為萃為升皆以君子上達而昭小人之無能為也困剛掩也剛掩則困并以陽剛上出而成養物之功聖人扶剛之義見矣總之世運已見敗壞終不可無一畨革故鼎新作用此乾坤六子以震之一陽動於下艮之一陽聳於上而成旋轉之功也振作安靜之功既成於是復還人道之始漸或以從容進歸妹得其所歸或以明動而為豐或以止所而為旅隨時寓義不拘其方持世以剛德而入世則兼用柔道此巽順而不迫與兊之能悅物又下篇所以終六子之功用也由是而委蛇應物為涣為節為中孚為小過應物之道常變交盡到得篇終而以既濟未濟二卦結之仍歸水火為天地之大用上篇水火各司其權下篇水火交著其用兩篇許多道理以未濟終尤見天地之理生生不盡尤見聖人之大作用也天地定位故上篇首乾坤中否泰山澤通氣雷風相薄故下篇首咸恆中損益水火不相射故上下經終坎離既濟未濟也雜卦傳序卦從先天圖來雜卦從後天圖來即所謂互卦也互卦只取中四爻相互循環互之成十六卦十六卦總歸乾坤既濟未濟四卦自乾坤以下五十六卦皆兩兩相對獨大過以下八卦不取相對此又在中四爻相互之外以見互體之無不可通也序卦主天道以乾坤始以既濟未濟終雜卦主人事以乾始以夬終結歸君子道長小人道憂聖人之用意深矣先天六十四卦由一生兩自下及上畫成後次第觀看萬象包入其中蓋極自然之妙用不著一毫人事擬議此互卦圖蓋從既畫之卦提出來安排推算或某某下去一畫上生一畫為反為對從隂從陽或不變或變其配合處幾于巧奪化工然畢竟是用人事推排終不如先天圖之為自然竊恐聖人亦未必用此巧法也此與序卦俱得之河內女子向來原不列於古經故為附論以俟後世之詳知易者易象大意存解
