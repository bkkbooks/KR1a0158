body:
  text: 易象大意存解易類提要臣等謹案易象大意存解一卷國朝任陳晉撰陳晉字似武號後山亦曰以齋興化人乾隆己未進士官徽州府教授是編不載經文惟折衷諸家之説明易象之大意故以為名考左傳韓起聘魯見易象春秋則易之主象古有明文陳晉以象為宗實三代以來舊法卷首標凡例七則多申尚象之旨書中首論太極五行兼談河洛先天諸圖然發揮明簡惟標舉其理所可通凡一切支離推衍布算經而繪奕譜者翦除殆盡其凡例有曰後之言象數者流入藝術之科其術至精而其理亦無奧澀然偏於一隅似反涉形下之器可云篤論次論彖論爻論象不廢互體之説蓋以雜卦傳為據次論六十四卦各括其大旨亦大抵切人事立言終以繫辭序卦説卦雜卦其文頗略蓋著書之意在於六十四卦餘皆互相發明耳在近時説易諸家猶可謂刋除枝蔓者矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀讀易要言易書原于象畫象畫者文辭之祖今經生治易專恃研求文周彖爻而置羲聖象畫不講先儒所謂有易下段無其上段者矣羲聖象畫原于河洛故易必從河洛根源説起易象天地山澤風雷水火數竒偶老少顯然明白後之言象數者流入藝術之科其術至精而其理亦更奧澀且偏涉一隅之論似反涉形下之器余故以本來自然之象數推論使經生家人人可曉易曰書不盡言言不盡意聖人立象以盡意伏羲畫卦聖人示意之書總之治易者會得其意則精粗皆可入解道理無不全具余故總其義曰易象大意存解六十四卦彖爻先儒傳詮極詳更何煩余之章解句釋余於各卦下略綴數句亦是融會大意使人閉目澄心而自得其意之所存會得其意再去索解章句則程傳本義折中等書具在可任研玩繫詞精者如易有太極數節及説卦傳天地定位數章已載在前圖説內後不更贅中間亦間有會意特為拈出易自田孟相承以迄於宋凡數十家言書可充梀余為約其精藴簡之又簡紙才數十頁而儒先精華亦已略具且各鎔以己意彚入儒先語録中所謂如花釀蜜蜜成不知其是花者也易以窮理豈僅作文字觀然卦畫有自然之文彖爻象傳繫辭文言其文法之顯然可愛玩者亦略示精藴於語言意象之外抑亦宜民不倦之意云爾
